<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LAPORAN EDC TRANSAKSI - LEBAK G157</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow-x: auto; }
        h2 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; margin-top: 0; }
        
        /* Layout Input */
        .upload-section { background: #f8fbff; padding: 25px; border-radius: 12px; border: 2px dashed #1a73e8; margin-bottom: 25px; }
        .input-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group { flex: 1; min-width: 250px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .input-group p { margin-top: 0; font-weight: bold; color: #1a73e8; }
        
        /* Buttons */
        .btn-container { text-align: center; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #prosesBtn { background: #1a73e8; color: white; }
        #prosesBtn:hover { background: #1557b0; }
        .btn-export { background: #27ae60; color: white; display: none; }
        .btn-export:hover { background: #1e8449; }

        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; font-size: 11px; }
        th, td { border: 1px solid #dee2e6; padding: 8px 5px; text-align: center; white-space: nowrap; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; }
        .toko-col { text-align: left; font-weight: bold; background: #f8f9fa; position: sticky; left: 0; z-index: 5; border-right: 2px solid #1a73e8; }
        .bca-head { background: #2ecc71; color: white; }
        .wide-head { background: #f39c12; color: white; }
        .zero { color: #e74c3c; font-weight: bold; background-color: #fff5f5; }
        .has-val { font-weight: bold; color: #2ecc71; }

        /* Overlay Loading */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; color: white; text-align: center; padding-top: 20vh; }
        .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <h3>Sedang Memproses Data...</h3>
</div>

<div class="container">
    <h2>LAPORAN TRANSAKSI EDC</h2>
    
    <div class="upload-section">
        <div class="input-grid">
            <div class="input-group">
                <p>1. Update Master Toko (Opsional)</p>
                <input type="file" id="masterInput" accept=".txt,.csv">
                <small style="color: #888; display: block; margin-top: 5px;">Upload .txt berisi kode toko per baris</small>
            </div>
            <div class="input-group">
                <p>2. Upload CSV Dari IGFS</p>
                <input type="file" id="fileInput" accept=".csv">
                <small style="color: #888; display: block; margin-top: 5px;">Gunakan file Type DEB & CCR</small>
            </div>
        </div>
        
        <div class="btn-container">
            <button id="prosesBtn" class="btn" onclick="jalankanProses()">⚡ JALANKAN PROSES</button>
            <button id="exportBtn" class="btn btn-export" onclick="exportToExcel()">💾 DOWNLOAD REKAP (.XLSX)</button>
        </div>
    </div>

    <div id="tableWrapper"></div>
</div>

<script>
    // Variabel let agar bisa di-update 
    let masterToko = ["TF5R", "F8E2", "T1PM", "T8BS", "TCTD", "TL83", "TOCA", "F33M", "T3CV", "FUN8", "F1XC", "F5Y0", "THUT", "TQA7", "FE0T", "TQ6X", "TG5K"]; 

    let processedDates = [];
    let matrixData = {};
    let rawCsvText = "";

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { rawCsvText = ev.target.result; };
            reader.readAsText(file);
        }
    });

    async function jalankanProses() {
        if (!rawCsvText) {
            alert("Harap pilih file CSV Transaksi terlebih dahulu!");
            return;
        }

        document.getElementById('overlay').style.display = 'block';

        // Beri jeda sedikit agar overlay muncul sebelum script berat berjalan
        setTimeout(async () => {
            try {
                const masterFile = document.getElementById('masterInput').files[0];
                if (masterFile) {
                    const text = await masterFile.text();
                    // Update masterToko dari file .txt 
                    masterToko = text.split(/\r?\n/).map(t => t.trim()).filter(t => t !== "");
                }

                processData(rawCsvText);
                renderHorizontalTable();
                document.getElementById('exportBtn').style.display = 'inline-block';
            } catch (err) {
                alert("Gagal memproses file. Pastikan format benar.");
            } finally {
                document.getElementById('overlay').style.display = 'none';
            }
        }, 100);
    }

    function processData(text) {
        const lines = text.split('\n');
        const dataRows = lines.slice(7); // IGFS header skip [cite: 68]
        let datesSet = new Set();
        let stats = {}; 

        dataRows.forEach(line => {
            const cols = line.split('|');
            if (cols.length > 10) {
                const tgl = cols[6].trim().replace(/"/g, ''); 
                const kodeToko = cols[2].trim().replace(/"/g, '').split('-')[0];
                const bank = cols[10].trim().replace(/"/g, '');

                datesSet.add(tgl);
                if (!stats[kodeToko]) stats[kodeToko] = {};
                if (!stats[kodeToko][tgl]) stats[kodeToko][tgl] = { bca: 0, wide: 0 };

                if (bank === "B01") stats[kodeToko][tgl].bca++;
                else stats[kodeToko][tgl].wide++;
            }
        });

        processedDates = Array.from(datesSet).sort((a,b) => {
            const pA = a.split('-'); const pB = b.split('-');
            return new Date(pA[2], pA[1]-1, pA[0]) - new Date(pB[2], pB[1]-1, pB[0]);
        });
        matrixData = stats;
    }

    function renderHorizontalTable() {
        const wrapper = document.getElementById('tableWrapper');
        let html = `<table><thead><tr><th rowspan="2">No</th><th rowspan="2" class="toko-col">Kode Toko</th>`;
        processedDates.forEach(tgl => { html += `<th colspan="2">${tgl}</th>`; });
        html += `<th colspan="2" style="background:#444">GRAND TOTAL</th></tr><tr>`;
        processedDates.forEach(() => { html += `<th class="bca-head">BCA</th><th class="wide-head">WIDE</th>`; });
        html += `<th class="bca-head">BCA</th><th class="wide-head">WIDE</th></tr></thead><tbody>`;

        masterToko.forEach((kode, idx) => {
            let rowHtml = `<tr><td>${idx+1}</td><td class="toko-col">${kode}</td>`;
            let tB = 0, tW = 0;
            processedDates.forEach(tgl => {
                const d = (matrixData[kode] && matrixData[kode][tgl]) ? matrixData[kode][tgl] : { bca: 0, wide: 0 };
                tB += d.bca; tW += d.wide;
                rowHtml += `<td class="${d.bca > 0 ? 'has-val' : 'zero'}">${d.bca}</td>`;
                rowHtml += `<td class="${d.wide > 0 ? 'has-val' : 'zero'}">${d.wide}</td>`;
            });
            rowHtml += `<td style="background:#e8fdf0; font-weight:bold">${tB}</td>`;
            rowHtml += `<td style="background:#fff9e8; font-weight:bold">${tW}</td></tr>`;
            html += rowHtml;
        });

        html += `</tbody></table>`;
        wrapper.innerHTML = html;
    }

    function exportToExcel() {
        const wb = XLSX.utils.book_new();
        const limit = Math.ceil(processedDates.length * 0.5); // 50% bolong [cite: 80, 81]

        let sheet1Data = [];
        masterToko.forEach((kode, idx) => {
            let row = { "No": idx+1, "Kode Toko": kode };
            let tb = 0, tw = 0;
            processedDates.forEach(tgl => {
                const d = (matrixData[kode] && matrixData[kode][tgl]) ? matrixData[kode][tgl] : { bca: 0, wide: 0 };
                row[`BCA (${tgl})`] = d.bca;
                row[`WIDE (${tgl})`] = d.wide;
                tb += d.bca; tw += d.wide;
            });
            row["Total BCA"] = tb; row["Total WIDE"] = tw;
            sheet1Data.push(row);
        });

        let sheet2Data = [];
        masterToko.forEach(kode => {
            let bZ = [], wZ = [];
            processedDates.forEach(tgl => {
                const d = (matrixData[kode] && matrixData[kode][tgl]) ? matrixData[kode][tgl] : { bca: 0, wide: 0 };
                const day = tgl.split('-')[0];
                if (d.bca === 0) bZ.push(day);
                if (d.wide === 0) wZ.push(day);
            });

            if (bZ.length >= limit || wZ.length >= limit) {
                sheet2Data.push({
                    "Kode Toko": kode,
                    "Masalah": `${bZ.length >= limit ? 'BCA ('+bZ.length+' hari)' : ''} ${wZ.length >= limit ? 'WIDE ('+wZ.length+' hari)' : ''}`,
                    "Keterangan": `BCA Kosong Tgl: ${bZ.join(',')} | WIDE Kosong Tgl: ${wZ.join(',')}`
                });
            }
        });

        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet1Data), "Data All");
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet2Data), "Prioritas Cek");
        XLSX.writeFile(wb, `Rekap_EDC_Final.xlsx`);
    }
</script>
</body>
</html>
