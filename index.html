    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f7f6; }
        .container { max-width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }

        .wide-head { background: #f39c12; color: white; }
        .zero { color: #e74c3c; font-weight: bold; background-color: #fff5f5; }

"TI4J", "T5VC", "T6W3", "FBO0", "TZKP", "TY8Q", "TFWM", "TRW8", "T2AF", "TIM1", "THXK", "TQC6", "T6P8", "TNS1", "FY3D", "TPSL", "TEZX", "TFUH", "TYK4", "F03F", "TPZZ", "FZZV", "F4MA", "FXVP", "FF4K", "TT0A", "TW23", "F17B", "T0LJ", "TDB3", "FDYO", "THPS", "TQ0L", "TBUK", "T7Y0", "FLWP", "T2SM", "FOSH", "FSGL", "TCAE", "TPF2", "T8UT", "TAVE", "TE2I", "F04F", "TOOC", "FEZK", "TPRH", "TI4Y", "FASZ", "TKX7", "T404", "T33O", "FYEJ", "TGWY", "TGRB", "T96C", "TKB0", "TY0W", "TA0U", "TZWV", "F0SE", "TPZ3", "TT9A", "FQOR", "TTJE", "TG2T", "F0B8", "T2YR", "TLDG", "TNM0", "T1I9", "FMPG", "TNHX", "TQYB", "TOBD", "FQ4X", "FL74", "T8JM", "FAL1", "TXZO", "TJNT", "TNEW", "T1I8", "TMWK", "T1E7", "FA72", "TUZR", "TVWS", "TQUC", "F6M6", "T9GR", "T1CE", "TCYU", "F2R9", "F83N", "F39A", "TDJO", "TA1T", "TVWV", "TP74", "TV5B", "FMIM", "TYLU", "FKHM", "TSTH", "T8SA", "TKJ2", "F8L8", "TRR7", "F597"];

    let processedDates = [];
    let matrixData = {};

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => processData(e.target.result);
        reader.readAsText(file);
    });

    function processData(text) {
        const lines = text.split('\n');
        const dataRows = lines.slice(7);
        let datesSet = new Set();
        let stats = {}; 

        dataRows.forEach(line => {
            const cols = line.split('|');
            if (cols.length > 10) {
                const tgl = cols[6].trim().replace(/"/g, '');
                const kodeToko = cols[2].trim().replace(/"/g, '').split('-')[0];
                const bank = cols[10].trim().replace(/"/g, '');

                datesSet.add(tgl);
                if (!stats[kodeToko]) stats[kodeToko] = {};
                if (!stats[kodeToko][tgl]) stats[kodeToko][tgl] = { bca: 0, wide: 0 };

                if (bank === "B01") stats[kodeToko][tgl].bca++;
                else stats[kodeToko][tgl].wide++;
            }
        });

        processedDates = Array.from(datesSet).sort((a,b) => {
            const pA = a.split('-'); const pB = b.split('-');
            return new Date(pA[2], pA[1]-1, pA[0]) - new Date(pB[2], pB[1]-1, pB[0]);
        });
        
        matrixData = stats;
        renderHorizontalTable();
        document.getElementById('exportBtn').style.display = 'inline-block';
    }

    function renderHorizontalTable() {
        const wrapper = document.getElementById('tableWrapper');
        let html = `<table><thead><tr><th rowspan="2">No</th><th rowspan="2" class="toko-col">Kode Toko</th>`;
        processedDates.forEach(tgl => { html += `<th colspan="2">${tgl}</th>`; });
        html += `<th colspan="2" style="background:#444">GRAND TOTAL</th></tr><tr>`;
        processedDates.forEach(() => { html += `<th class="bca-head">BCA</th><th class="wide-head">WIDE</th>`; });
        html += `<th class="bca-head">BCA</th><th class="wide-head">WIDE</th></tr></thead><tbody>`;

        masterToko.forEach((kode, idx) => {
            let rowHtml = `<tr><td>${idx+1}</td><td class="toko-col">${kode}</td>`;
            let storeTotalBca = 0, storeTotalWide = 0;
            processedDates.forEach(tgl => {
                const d = (matrixData[kode] && matrixData[kode][tgl]) ? matrixData[kode][tgl] : { bca: 0, wide: 0 };
                storeTotalBca += d.bca; storeTotalWide += d.wide;
                rowHtml += `<td class="${d.bca > 0 ? 'has-val' : 'zero'}">${d.bca}</td>`;
                rowHtml += `<td class="${d.wide > 0 ? 'has-val' : 'zero'}">${d.wide}</td>`;
            });
            rowHtml += `<td style="background:#e8fdf0; font-weight:bold">${storeTotalBca}</td>`;
            rowHtml += `<td style="background:#fff9e8; font-weight:bold">${storeTotalWide}</td></tr>`;
            html += rowHtml;
        });
        html += `</tbody></table>`;
        wrapper.innerHTML = html;
    }

    function exportToExcel() {
    const wb = XLSX.utils.book_new();
    const totalHariCSV = processedDates.length;
    const limit = Math.ceil(totalHariCSV * 0.5); // Minimal 50% bolong

    // --- Sheet 1: Data All (Tetap Sama) ---
    let sheet1Data = [];
    masterToko.forEach((kode, idx) => {
        let row = { "No": idx+1, "Kode Toko": kode };
        let tB = 0, tW = 0;
        processedDates.forEach(tgl => {
            const d = (matrixData[kode] && matrixData[kode][tgl]) ? matrixData[kode][tgl] : { bca: 0, wide: 0 };
            row[`BCA (${tgl})`] = d.bca;
            row[`WIDE (${tgl})`] = d.wide;
            tB += d.bca; tW += d.wide;
        });
        row["Grand Total BCA"] = tB;
        row["Grand Total WIDE"] = tW;
        sheet1Data.push(row);
    });

    // --- Sheet 2: Rekap Prioritas (Logika Baru) ---
    let sheet2Data = [];
    masterToko.forEach((kode) => {
        let bcaZeroDates = [];
        let wideZeroDates = [];

        processedDates.forEach(tgl => {
            const d = (matrixData[kode] && matrixData[kode][tgl]) ? matrixData[kode][tgl] : { bca: 0, wide: 0 };
            const day = tgl.split('-')[0];
            if (d.bca === 0) bcaZeroDates.push(day);
            if (d.wide === 0) wideZeroDates.push(day);
        });

        // Filter: Hanya proses jika salah satu (atau keduanya) bolong >= 50%
        let isBcaIssue = bcaZeroDates.length >= limit;
        let isWideIssue = wideZeroDates.length >= limit;

        if (isBcaIssue || isWideIssue) {
            let detailStatus = [];
            let periodeTampil = [];

            if (isBcaIssue) {
                detailStatus.push(`BCA (${bcaZeroDates.join(',')})`);
                periodeTampil.push(`${bcaZeroDates.length} Hari BCA`);
            }
            if (isWideIssue) {
                detailStatus.push(`WIDE/MTI (${wideZeroDates.join(',')})`);
                periodeTampil.push(`${wideZeroDates.length} Hari WIDE`);
            }

            sheet2Data.push({
                "Kode Toko": kode,
                "Periode Masalah": periodeTampil.join(' & '),
                "Keterangan": "Tidak Ada Transaksi " + detailStatus.join(' dan ') + " Maret 2026"
            });
        }
    });

    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet1Data), "Data All");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(sheet2Data), "Prioritas Cek");
    XLSX.writeFile(wb, `Rekap_EDC_Prioritas_Final.xlsx`);
}
